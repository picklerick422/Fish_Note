<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- 气泡背景装饰 -->
  <circle cx="200" cy="45" r="9" fill="#BAE6FD" opacity="0.5"/>
  <circle cx="215" cy="28" r="6" fill="#CFFAFE" opacity="0.4"/>
  <circle cx="190" cy="18" r="4" fill="#A5F3FC" opacity="0.3"/>
  <!-- 鱼身（椭圆主体） -->
  <ellipse cx="108" cy="130" rx="64" ry="46" fill="#38BDF8" stroke="#0369A1" stroke-width="2.5"/>
  <!-- 鱼腹（浅色渐变效果） -->
  <ellipse cx="110" cy="142" rx="50" ry="32" fill="#BAE6FD"/>
  <!-- 鱼尾（分叉） -->
  <path d="M170 130l-24-24v18l-18-12v36l18-12v18z" fill="#0284C7" stroke="#0369A1" stroke-width="2.5"/>
  <!-- 背鳍 -->
  <path d="M130 84q18-20 30-16" stroke="#0284C7" stroke-width="5" stroke-linecap="round"/>
  <!-- 腹鳍 -->
  <path d="M120 168q8-10 18-8" stroke="#0284C7" stroke-width="4" stroke-linecap="round"/>
  <!-- 大眼白 -->
  <circle cx="74" cy="118" r="17" fill="#FFFFFF" stroke="#0369A1" stroke-width="2"/>
  <!-- 瞳孔 -->
  <circle cx="70" cy="118" r="8" fill="#0C1929"/>
  <!-- 高光 -->
  <circle cx="67" cy="114" r="3" fill="#FFFFFF"/>
  <!-- 微笑嘴巴 -->
  <path d="M54 142q5 5 10 0" stroke="#0369A1" stroke-width="2.5"/>
  <!-- 腮红 -->
  <circle cx="50" cy="135" r="6" fill="#7DD3FC" opacity="0.6"/>
  <!-- 鱼鳞纹理 -->
  <path d="M90 108q6-6 12 0" stroke="#A5F3FC" stroke-width="1.5" opacity="0.5"/>
  <path d="M96 118q6-6 12 0" stroke="#A5F3FC" stroke-width="1.5" opacity="0.5"/>
  <path d="M90 138q6-6 12 0" stroke="#A5F3FC" stroke-width="1.5" opacity="0.5"/>
  <!-- 脚底水影 -->
  <ellipse cx="110" cy="195" rx="45" ry="8" fill="#ECFEFF"/>
</svg>
